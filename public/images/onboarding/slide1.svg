<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="400" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d3320"/>
      <stop offset="100%" stop-color="#071a10"/>
    </linearGradient>
    <linearGradient id="carBody" x1="80" y1="140" x2="320" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="phoneGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="320" rx="24" fill="url(#bg1)"/>
  <rect width="400" height="320" rx="24" fill="url(#bg1)" opacity="0.5"/>
  
  <!-- Grid lines subtle -->
  <line x1="0" y1="80" x2="400" y2="80" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="160" x2="400" y2="160" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="240" x2="400" y2="240" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  
  <!-- Glow behind car -->
  <ellipse cx="200" cy="190" rx="120" ry="60" fill="#20df6c" opacity="0.08" filter="url(#glow1)"/>
  
  <!-- Car body -->
  <g filter="url(#shadow1)">
    <!-- Car base/body -->
    <path d="M90 210 L100 180 C110 160 140 140 170 135 L250 130 C270 130 290 140 300 155 L320 180 L330 210 Z" fill="url(#carBody)"/>
    <!-- Car roof -->
    <path d="M140 140 L155 110 C165 95 190 85 215 85 L240 85 C255 85 265 95 270 110 L280 140 Z" fill="#7dd3fc" opacity="0.6"/>
    <!-- Windows -->
    <path d="M155 135 L165 112 C170 102 185 95 200 95 L205 95 L205 135 Z" fill="#0ea5e9" opacity="0.4"/>
    <path d="M215 95 L215 135 L265 135 L258 112 C253 102 243 95 230 95 Z" fill="#0ea5e9" opacity="0.4"/>
    <!-- Car bottom -->
    <rect x="85" y="210" width="250" height="20" rx="8" fill="#0369a1"/>
    <!-- Headlights -->
    <ellipse cx="105" cy="200" rx="8" ry="5" fill="#fef08a" opacity="0.9"/>
    <ellipse cx="315" cy="200" rx="8" ry="5" fill="#fef08a" opacity="0.9"/>
    <!-- Wheels -->
    <circle cx="140" cy="232" r="22" fill="#1e293b"/>
    <circle cx="140" cy="232" r="14" fill="#475569"/>
    <circle cx="140" cy="232" r="6" fill="#94a3b8"/>
    <circle cx="280" cy="232" r="22" fill="#1e293b"/>
    <circle cx="280" cy="232" r="14" fill="#475569"/>
    <circle cx="280" cy="232" r="6" fill="#94a3b8"/>
    <!-- Wheel shine -->
    <path d="M133 225 L147 225" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M140 218 L140 232" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M273 225 L287 225" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M280 218 L280 232" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Coins floating -->
  <g filter="url(#glow1)">
    <!-- Coin 1 - large -->
    <circle cx="300" cy="100" r="24" fill="url(#coinGrad)" stroke="#fbbf24" stroke-width="2"/>
    <text x="300" y="107" text-anchor="middle" fill="#92400e" font-size="20" font-weight="bold" font-family="Arial">$</text>
    
    <!-- Coin 2 - medium -->
    <circle cx="260" cy="60" r="18" fill="url(#coinGrad)" stroke="#fbbf24" stroke-width="1.5" opacity="0.85"/>
    <text x="260" y="66" text-anchor="middle" fill="#92400e" font-size="15" font-weight="bold" font-family="Arial">$</text>
    
    <!-- Coin 3 - small -->
    <circle cx="330" cy="70" r="12" fill="url(#coinGrad)" stroke="#fbbf24" stroke-width="1" opacity="0.7"/>
    <text x="330" y="75" text-anchor="middle" fill="#92400e" font-size="10" font-weight="bold" font-family="Arial">$</text>
    
    <!-- Coin 4 - tiny -->
    <circle cx="340" cy="140" r="10" fill="url(#coinGrad)" opacity="0.6"/>
    <text x="340" y="144" text-anchor="middle" fill="#92400e" font-size="8" font-weight="bold" font-family="Arial">$</text>
  </g>
  
  <!-- Phone 1 - left -->
  <g transform="translate(50, 40) rotate(-15, 30, 50)" filter="url(#shadow1)">
    <rect width="50" height="85" rx="8" fill="url(#phoneGrad)" stroke="#475569" stroke-width="1"/>
    <rect x="4" y="12" width="42" height="60" rx="3" fill="#0f172a"/>
    <!-- Phone screen content -->
    <rect x="8" y="16" width="34" height="8" rx="2" fill="#22c55e" opacity="0.6"/>
    <rect x="8" y="28" width="20" height="4" rx="1" fill="#64748b" opacity="0.5"/>
    <rect x="8" y="36" width="28" height="4" rx="1" fill="#64748b" opacity="0.3"/>
    <rect x="8" y="44" width="34" height="20" rx="2" fill="#1e40af" opacity="0.3"/>
    <!-- Phone notch -->
    <rect x="17" y="4" width="16" height="4" rx="2" fill="#475569"/>
  </g>
  
  <!-- Phone 2 - right top -->
  <g transform="translate(280, 20) rotate(10, 25, 45)" filter="url(#shadow1)" opacity="0.7">
    <rect width="45" height="75" rx="7" fill="url(#phoneGrad)" stroke="#475569" stroke-width="1"/>
    <rect x="3" y="10" width="39" height="52" rx="3" fill="#0f172a"/>
    <rect x="7" y="14" width="31" height="7" rx="2" fill="#f59e0b" opacity="0.5"/>
    <rect x="7" y="25" width="18" height="3" rx="1" fill="#64748b" opacity="0.4"/>
    <rect x="7" y="32" width="24" height="3" rx="1" fill="#64748b" opacity="0.3"/>
    <rect x="14" y="2" width="14" height="4" rx="2" fill="#475569"/>
  </g>
  
  <!-- Sparkle effects -->
  <circle cx="120" cy="80" r="2" fill="white" opacity="0.6"/>
  <circle cx="350" cy="180" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="60" cy="180" r="1.5" fill="#20df6c" opacity="0.5"/>
  <circle cx="200" cy="50" r="2" fill="#fbbf24" opacity="0.5"/>
  
  <!-- Light rays from car -->
  <line x1="200" y1="160" x2="180" y2="60" stroke="#20df6c" stroke-width="0.5" opacity="0.1"/>
  <line x1="200" y1="160" x2="220" y2="50" stroke="#20df6c" stroke-width="0.5" opacity="0.1"/>
  <line x1="200" y1="160" x2="250" y2="70" stroke="#fbbf24" stroke-width="0.5" opacity="0.1"/>
</svg>
