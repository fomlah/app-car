<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="400" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d2833"/>
      <stop offset="100%" stop-color="#071a1f"/>
    </linearGradient>
    <linearGradient id="walletGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <rect width="400" height="320" rx="24" fill="url(#bg2)"/>
  
  <!-- Grid -->
  <line x1="0" y1="80" x2="400" y2="80" stroke="white" stroke-opacity="0.03"/>
  <line x1="0" y1="160" x2="400" y2="160" stroke="white" stroke-opacity="0.03"/>
  <line x1="0" y1="240" x2="400" y2="240" stroke="white" stroke-opacity="0.03"/>
  
  <!-- Glow -->
  <ellipse cx="200" cy="160" rx="130" ry="80" fill="#06b6d4" opacity="0.06" filter="url(#glow2)"/>
  
  <!-- Wallet main -->
  <g transform="translate(120, 70)" filter="url(#shadow2)">
    <rect width="160" height="110" rx="16" fill="url(#walletGrad)"/>
    <rect x="8" y="8" width="144" height="94" rx="12" fill="#7c3aed" opacity="0.5"/>
    <!-- Wallet flap -->
    <path d="M0 35 L160 35" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
    <!-- Card slot -->
    <rect x="20" y="48" width="80" height="12" rx="4" fill="white" opacity="0.15"/>
    <rect x="20" y="66" width="50" height="8" rx="3" fill="white" opacity="0.1"/>
    <!-- Wallet clasp -->
    <circle cx="140" cy="55" r="8" fill="#a78bfa" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
    <path d="M137 55 L143 55" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M140 52 L140 58" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Credit cards flying out -->
  <g transform="translate(80, 120) rotate(-20, 60, 40)" filter="url(#shadow2)">
    <rect width="110" height="70" rx="10" fill="url(#cardGrad)" stroke="#334155" stroke-width="1"/>
    <rect x="10" y="12" width="30" height="20" rx="3" fill="#fbbf24" opacity="0.7"/>
    <rect x="10" y="42" width="60" height="6" rx="2" fill="#475569" opacity="0.5"/>
    <rect x="10" y="52" width="40" height="6" rx="2" fill="#475569" opacity="0.3"/>
    <circle cx="90" cy="20" r="10" fill="#ef4444" opacity="0.6"/>
    <circle cx="80" cy="20" r="10" fill="#f97316" opacity="0.6"/>
  </g>
  
  <g transform="translate(230, 100) rotate(12, 55, 35)" filter="url(#shadow2)" opacity="0.8">
    <rect width="100" height="65" rx="9" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
    <rect x="8" y="10" width="25" height="16" rx="3" fill="#22c55e" opacity="0.6"/>
    <rect x="8" y="35" width="55" height="5" rx="2" fill="#475569" opacity="0.4"/>
    <rect x="8" y="44" width="35" height="5" rx="2" fill="#475569" opacity="0.3"/>
  </g>
  
  <!-- Expense icons floating -->
  <!-- Fuel icon -->
  <g transform="translate(55, 50)">
    <circle r="18" cx="18" cy="18" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5" opacity="0.8"/>
    <text x="18" y="24" text-anchor="middle" font-size="18" fill="#06b6d4">⛽</text>
  </g>
  
  <!-- Wrench icon -->
  <g transform="translate(310, 60)">
    <circle r="16" cx="16" cy="16" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5" opacity="0.8"/>
    <text x="16" y="22" text-anchor="middle" font-size="16" fill="#06b6d4">🔧</text>
  </g>
  
  <!-- Phone icon -->
  <g transform="translate(320, 200)">
    <circle r="14" cx="14" cy="14" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5" opacity="0.7"/>
    <text x="14" y="20" text-anchor="middle" font-size="14" fill="#06b6d4">📱</text>
  </g>
  
  <!-- Cleaning icon -->
  <g transform="translate(40, 220)">
    <circle r="14" cx="14" cy="14" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5" opacity="0.7"/>
    <text x="14" y="20" text-anchor="middle" font-size="14" fill="#06b6d4">🧹</text>
  </g>
  
  <!-- Chart bars at bottom -->
  <g transform="translate(100, 210)">
    <rect x="0" y="40" width="24" height="50" rx="4" fill="#ef4444" opacity="0.4"/>
    <rect x="35" y="25" width="24" height="65" rx="4" fill="#ef4444" opacity="0.5"/>
    <rect x="70" y="10" width="24" height="80" rx="4" fill="#ef4444" opacity="0.6"/>
    <rect x="105" y="30" width="24" height="60" rx="4" fill="#22c55e" opacity="0.5"/>
    <rect x="140" y="50" width="24" height="40" rx="4" fill="#22c55e" opacity="0.4"/>
    <rect x="175" y="35" width="24" height="55" rx="4" fill="#06b6d4" opacity="0.4"/>
  </g>
  
  <!-- Sparkles -->
  <circle cx="150" cy="50" r="2" fill="white" opacity="0.5"/>
  <circle cx="350" cy="150" r="1.5" fill="#06b6d4" opacity="0.6"/>
  <circle cx="30" cy="160" r="2" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="370" cy="270" r="1.5" fill="white" opacity="0.3"/>
</svg>
