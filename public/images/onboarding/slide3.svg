<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="400" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a2e0d"/>
      <stop offset="100%" stop-color="#0f1a07"/>
    </linearGradient>
    <linearGradient id="chartBar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="chartBar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <rect width="400" height="320" rx="24" fill="url(#bg3)"/>
  
  <!-- Grid -->
  <line x1="0" y1="80" x2="400" y2="80" stroke="white" stroke-opacity="0.03"/>
  <line x1="0" y1="160" x2="400" y2="160" stroke="white" stroke-opacity="0.03"/>
  <line x1="0" y1="240" x2="400" y2="240" stroke="white" stroke-opacity="0.03"/>
  
  <!-- Glow -->
  <ellipse cx="200" cy="160" rx="140" ry="90" fill="#22c55e" opacity="0.05" filter="url(#glow3)"/>
  
  <!-- Main phone/tablet screen -->
  <g transform="translate(75, 30)" filter="url(#shadow3)">
    <rect width="250" height="260" rx="20" fill="url(#screenGrad)" stroke="#334155" stroke-width="1.5"/>
    
    <!-- Status bar -->
    <rect x="15" y="12" width="40" height="6" rx="3" fill="#475569" opacity="0.5"/>
    <rect x="195" y="12" width="40" height="6" rx="3" fill="#475569" opacity="0.5"/>
    
    <!-- Header -->
    <rect x="15" y="30" width="100" height="10" rx="3" fill="white" opacity="0.15"/>
    <rect x="15" y="46" width="60" height="7" rx="2" fill="#475569" opacity="0.3"/>
    
    <!-- Big number -->
    <text x="25" y="82" font-size="28" font-weight="bold" fill="#22c55e" font-family="Arial" opacity="0.9">+12,450</text>
    <text x="160" y="82" font-size="12" fill="#475569" font-family="Arial">ج.م</text>
    
    <!-- Chart area -->
    <g transform="translate(15, 95)">
      <!-- Chart grid lines -->
      <line x1="0" y1="0" x2="220" y2="0" stroke="#334155" stroke-width="0.5" opacity="0.5"/>
      <line x1="0" y1="25" x2="220" y2="25" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="50" x2="220" y2="50" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="75" x2="220" y2="75" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="100" x2="220" y2="100" stroke="#334155" stroke-width="0.5" opacity="0.5"/>
      
      <!-- Income bars (green) -->
      <rect x="5" y="30" width="14" height="70" rx="3" fill="url(#chartBar1)" opacity="0.8"/>
      <rect x="40" y="15" width="14" height="85" rx="3" fill="url(#chartBar1)" opacity="0.9"/>
      <rect x="75" y="25" width="14" height="75" rx="3" fill="url(#chartBar1)" opacity="0.85"/>
      <rect x="110" y="10" width="14" height="90" rx="3" fill="url(#chartBar1)"/>
      <rect x="145" y="20" width="14" height="80" rx="3" fill="url(#chartBar1)" opacity="0.9"/>
      <rect x="180" y="5" width="14" height="95" rx="3" fill="url(#chartBar1)"/>
      
      <!-- Expense bars (red) -->
      <rect x="22" y="55" width="14" height="45" rx="3" fill="url(#chartBar2)" opacity="0.6"/>
      <rect x="57" y="50" width="14" height="50" rx="3" fill="url(#chartBar2)" opacity="0.65"/>
      <rect x="92" y="60" width="14" height="40" rx="3" fill="url(#chartBar2)" opacity="0.6"/>
      <rect x="127" y="45" width="14" height="55" rx="3" fill="url(#chartBar2)" opacity="0.7"/>
      <rect x="162" y="55" width="14" height="45" rx="3" fill="url(#chartBar2)" opacity="0.6"/>
      <rect x="197" y="40" width="14" height="60" rx="3" fill="url(#chartBar2)" opacity="0.65"/>
      
      <!-- Month labels -->
      <text x="12" y="115" text-anchor="middle" font-size="8" fill="#475569" font-family="Arial">يناير</text>
      <text x="47" y="115" text-anchor="middle" font-size="8" fill="#475569" font-family="Arial">فبراير</text>
      <text x="82" y="115" text-anchor="middle" font-size="8" fill="#475569" font-family="Arial">مارس</text>
      <text x="117" y="115" text-anchor="middle" font-size="8" fill="#475569" font-family="Arial">أبريل</text>
      <text x="152" y="115" text-anchor="middle" font-size="8" fill="#475569" font-family="Arial">مايو</text>
      <text x="187" y="115" text-anchor="middle" font-size="8" fill="#475569" font-family="Arial">يونيو</text>
    </g>
    
    <!-- Legend -->
    <circle cx="25" cy="225" r="4" fill="#22c55e"/>
    <text x="35" y="228" font-size="9" fill="#94a3b8" font-family="Arial">الدخل</text>
    <circle cx="80" cy="225" r="4" fill="#ef4444"/>
    <text x="90" y="228" font-size="9" fill="#94a3b8" font-family="Arial">المصروفات</text>
    
    <!-- Profit line -->
    <rect x="15" y="238" width="220" height="1" rx="0.5" fill="#334155" opacity="0.5"/>
    <text x="25" y="252" font-size="10" fill="#94a3b8" font-family="Arial">صافي الربح</text>
    <text x="195" y="252" font-size="12" font-weight="bold" fill="#22c55e" font-family="Arial">67%</text>
  </g>
  
  <!-- Floating elements -->
  <!-- Arrow up -->
  <g transform="translate(340, 60)">
    <circle r="18" cx="18" cy="18" fill="#0f172a" stroke="#22c55e" stroke-width="1.5" opacity="0.8"/>
    <path d="M18 25 L18 11 M12 17 L18 11 L24 17" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Percentage badge -->
  <g transform="translate(20, 80)">
    <rect width="50" height="28" rx="8" fill="#0f172a" stroke="#22c55e" stroke-width="1" opacity="0.9"/>
    <text x="25" y="19" text-anchor="middle" font-size="11" font-weight="bold" fill="#22c55e" font-family="Arial">+24%</text>
  </g>
  
  <!-- Star -->
  <g transform="translate(350, 240)">
    <circle r="14" cx="14" cy="14" fill="#0f172a" stroke="#fbbf24" stroke-width="1" opacity="0.7"/>
    <text x="14" y="20" text-anchor="middle" font-size="16">⭐</text>
  </g>
  
  <!-- Sparkles -->
  <circle cx="50" cy="50" r="2" fill="#22c55e" opacity="0.5"/>
  <circle cx="370" cy="160" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="30" cy="270" r="2" fill="#22c55e" opacity="0.3"/>
  <circle cx="380" cy="300" r="1.5" fill="#fbbf24" opacity="0.4"/>
</svg>
